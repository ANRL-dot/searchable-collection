<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Searchable Sheet</title>
  <style>
    :root { font-family: system-ui, Arial, sans-serif; }
    body { margin: 16px; }
    .bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type="search"] { padding: 10px 12px; min-width: 280px; width: min(640px, 100%); }
    button { padding: 10px 12px; cursor: pointer; }
    .meta { font-size: 12px; opacity: 0.75; }
    .table-wrap { overflow: auto; border: 1px solid #ddd; border-radius: 8px; margin-top: 12px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid #eee; padding: 8px 10px; text-align: left; vertical-align: top; }
    th { background: #fafafa; }
    tr.hide { display: none; }
    .error { color: #b00020; margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="bar">
    <input id="q" type="search" placeholder="Type to search..." autocomplete="off" />
    <button id="clear" type="button">Clear</button>
    <span id="count" class="meta"></span>
  </div>

  <div id="status" class="meta" style="margin-top:8px;">Loading…</div>
  <div id="err" class="error" hidden></div>

  <div class="table-wrap">
    <table id="tbl" aria-label="Searchable sheet table">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="./app.js?v=20260228a"></script>
</body>
</html>
